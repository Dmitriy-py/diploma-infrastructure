apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods-direct
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/*/*.log

        pipeline_stages:
          - cri: {}
          - regex:
              source: filename
              expression: "^/var/log/pods/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+_[^_]+_[^_]+|[^_]+_[^_]+|[^_]+)_(?P<uid>[a-f0-9-]{36})/(?P<container>[^/]+)/.*\\.log$"
          - labels:
              namespace:
              pod: pod_name
              container:
              app: pod_name