apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      terminationGracePeriodSeconds: 10
      containers:
      - name: promtail
        image: grafana/promtail:2.9.0
        args:
        - "-config.file=/etc/promtail/config.yaml"
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - name: config-volume
          mountPath: /etc/promtail
        - name: run
          mountPath: /run/promtail
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlib
          mountPath: /var/lib
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: promtail-config
      - name: run
        hostPath:
          path: /run/promtail
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlib
        hostPath:
          path: /var/lib