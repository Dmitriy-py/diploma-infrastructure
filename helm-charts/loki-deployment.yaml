apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsUser: 10001
      containers:
      - name: loki
        image: grafana/loki:2.9.0
        args:
        - "-config.file=/etc/loki/config/config.yaml"
        ports:
        - containerPort: 3100
          name: http
        volumeMounts:
        - name: config-volume
          mountPath: /etc/loki/config
        - name: data-volume
          mountPath: /var/lib/loki
      volumes:
      - name: config-volume
        configMap:
          name: loki-config
      - name: data-volume
        persistentVolumeClaim:
          claimName: loki-data