name: "Terraform Infrastructure Management"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform_ci:
    name: "Terraform CI (Plan)"
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_SECRET_KEY }}
      TF_VAR_yc_token: ${{ secrets.YC_TOKEN }}
      TF_VAR_yc_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_yc_folder_id: ${{ secrets.YC_FOLDER_ID }}
      TF_VAR_access_key: ${{ secrets.YC_S3_ACCESS_KEY }}
      TF_VAR_secret_key: ${{ secrets.YC_S3_SECRET_KEY }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate with Yandex Cloud
        run: |
          echo '${{ secrets.YC_SA_KEY }}' > sa-key.json
          ~/yandex-cloud/bin/yc config set service-account-key sa-key.json
          ~/yandex-cloud/bin/yc config set cloud-id ${{ secrets.YC_CLOUD_ID }}
          ~/yandex-cloud/bin/yc config set folder-id ${{ secrets.YC_FOLDER_ID }}

      # --- ПРОВЕРКА SETUP ---
      - name: Terraform Init & Plan (Setup)
        run: |
          terraform -chdir=setup init
          terraform -chdir=setup plan -no-color

      # --- ПРОВЕРКА NETWORK ---
      - name: Terraform Init & Plan (Network)
        run: |
          terraform -chdir=network init
          terraform -chdir=network plan -no-color

      # --- ПРОВЕРКА HOSTS ---
      - name: Terraform Init & Plan (Hosts)
        run: |
          terraform -chdir=hosts init
          terraform -chdir=hosts plan -no-color
